<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>追番日历 / Anime Calendar</title>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      position: relative;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #f8fafc;
      background: #07060d;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .jjk-background {
      position: fixed;
      inset: 0;
      z-index: -2;
      overflow: hidden;
      background: #07060d;
    }
    .jjk-background-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      transform: scale(1.02);
      filter: saturate(1.06) contrast(1.05) brightness(0.92);
      image-rendering: auto;
    }
    .jjk-background-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(7, 6, 13, 0.18) 0%, rgba(7, 6, 13, 0.72) 58%, rgba(7, 6, 13, 0.94) 100%),
        radial-gradient(circle at 18% 20%, rgba(124, 58, 237, 0.22), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(220, 38, 38, 0.16), transparent 24%);
      pointer-events: none;
    }
    .jjk-background::before,
    .jjk-background::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .jjk-background::before {
      background:
        radial-gradient(circle at 30% 40%, rgba(167, 139, 250, 0.12), transparent 18%),
        radial-gradient(circle at 70% 60%, rgba(239, 68, 68, 0.1), transparent 16%);
      animation: curse-pulse 8s ease-in-out infinite alternate;
    }
    .jjk-background::after {
      background-image:
        repeating-linear-gradient(
          115deg,
          rgba(255, 255, 255, 0.03) 0 1px,
          transparent 1px 80px
        );
      opacity: 0.35;
      mix-blend-mode: screen;
    }
    @keyframes curse-pulse {
      from { opacity: 0.65; transform: scale(1); }
      to { opacity: 1; transform: scale(1.03); }
    }
    .page-shell {
      position: relative;
      z-index: 1;
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 64px;
    }
    .hero { display: grid; gap: 16px; margin-bottom: 28px; }
    .hero-badge {
      display: inline-flex; width: fit-content; padding: 8px 14px; border-radius: 999px;
      background: rgba(88, 28, 135, 0.35); border: 1px solid rgba(216, 180, 254, 0.28);
      color: #e9d5ff; font-size: 14px;
      box-shadow: 0 0 24px rgba(124, 58, 237, 0.18);
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 48px);
      text-shadow: 0 0 28px rgba(124, 58, 237, 0.35);
    }
    .hero p { margin: 0; max-width: 720px; color: #d8b4fe; line-height: 1.7; }
    .toolbar, .stats-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 18px; }
    button {
      padding: 10px 14px; border: 0; border-radius: 999px; cursor: pointer; color: white;
      background: linear-gradient(135deg, #7c3aed, #dc2626); font: inherit;
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.25);
    }
    button.secondary { background: rgba(255,255,255,0.1); color: #e9d5ff; box-shadow: none; }
    .status-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }
    .status-tab {
      min-width: 148px;
      background: rgba(255,255,255,0.08);
      box-shadow: none;
      color: #ddd6fe;
    }
    .status-tab.active {
      background: linear-gradient(135deg, #7c3aed, #dc2626);
      color: #fff;
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.25);
    }
    .stat-card {
      min-width: 140px; padding: 14px 16px; border-radius: 16px;
      background: rgba(17, 10, 29, 0.72); border: 1px solid rgba(216, 180, 254, 0.12);
      backdrop-filter: blur(8px);
    }
    .stat-card strong { display: block; font-size: 24px; margin-bottom: 4px; color: #f5f3ff; }
    .stat-card span { color: #c4b5fd; font-size: 13px; }
    .status-box {
      padding: 16px 18px; border-radius: 16px; background: rgba(17, 10, 29, 0.72);
      border: 1px solid rgba(216, 180, 254, 0.12); color: #ddd6fe; margin-bottom: 18px;
      backdrop-filter: blur(8px);
    }
    .status-box.error { border-color: rgba(248,113,113,0.35); color: #fecaca; }
    .status-box.is-hidden { display: none; }
    .calendar-grid { display: grid; gap: 18px; }
    .day-section {
      border-radius: 24px; overflow: hidden; background: rgba(12, 8, 20, 0.78);
      border: 1px solid rgba(167, 139, 250, 0.14);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
    }
    .day-header {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
      padding: 18px 20px;
      background: linear-gradient(90deg, rgba(124, 58, 237, 0.28), rgba(220, 38, 38, 0.16));
      border-bottom: 1px solid rgba(216, 180, 254, 0.12);
    }
    .day-header h2 { margin: 0; font-size: 20px; flex: 0 0 auto; }
    .day-year-tag {
      flex: 1;
      text-align: center;
      color: #ddd6fe;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
    }
    .day-count { color: #cbd5e1; font-size: 14px; flex: 0 0 auto; }
    .year-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 10px 0 16px;
      color: #f5f3ff;
      font-size: 22px;
      font-weight: 700;
    }
    .year-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(216, 180, 254, 0.22);
    }
    .month-section {
      border-radius: 24px;
      overflow: hidden;
      background: rgba(12, 8, 20, 0.78);
      border: 1px solid rgba(167, 139, 250, 0.14);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
      margin-bottom: 18px;
    }
    .month-header {
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 600;
      color: #f3e8ff;
      background: rgba(88, 28, 135, 0.32);
      border-bottom: 1px solid rgba(216, 180, 254, 0.12);
    }
    .anime-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; padding: 18px;
    }
    .anime-card {
      display: grid; grid-template-columns: 84px 1fr; gap: 12px; padding: 12px; border-radius: 18px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(167, 139, 250, 0.1);
    }
    .anime-cover {
      width: 84px; height: 118px; border-radius: 12px; object-fit: cover; background: rgba(255,255,255,0.08);
    }
    .anime-cover.placeholder {
      display: grid; place-items: center; color: #64748b; font-size: 12px;
    }
    .anime-title-group { display: grid; gap: 4px; }
    .anime-title { margin: 0; font-size: 15px; line-height: 1.4; }
    .anime-title-jp { margin: 0; color: #c4b5fd; font-size: 12px; line-height: 1.45; }
    .anime-meta { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
    .tag {
      display: inline-flex; padding: 4px 8px; border-radius: 999px;
      background: rgba(255,255,255,0.08); color: #ddd6fe; font-size: 12px;
    }
    .tag.accent { background: rgba(124, 58, 237, 0.28); color: #f3e8ff; }
    .tag.score-high-tag { background: rgba(251, 191, 36, 0.22); color: #fde68a; border: 1px solid rgba(251, 191, 36, 0.35); }
    .score-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin: 0 0 8px; }
    .score-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 999px; font-size: 13px; font-weight: 700;
    }
    .score-badge.score-high { background: rgba(251, 191, 36, 0.18); color: #fde68a; border: 1px solid rgba(251, 191, 36, 0.35); }
    .score-badge.score-mid { background: rgba(167, 139, 250, 0.18); color: #ddd6fe; border: 1px solid rgba(167, 139, 250, 0.28); }
    .score-badge.score-low { background: rgba(255,255,255,0.08); color: #cbd5e1; }
    .score-badge.score-none { background: rgba(255,255,255,0.05); color: #94a3b8; font-weight: 500; }
    .score-voters { color: #a78bfa; font-size: 12px; }
    .subsection-header {
      padding: 14px 20px 0;
      font-size: 15px;
      font-weight: 600;
      color: #e9d5ff;
    }
    .featured-grid .anime-card {
      border-color: rgba(251, 191, 36, 0.28);
      background: rgba(251, 191, 36, 0.06);
    }
    .anime-time { color: #c4b5fd; font-size: 13px; margin: 0 0 8px; }
    .track-button.is-tracked { background: rgba(255,255,255,0.12); color: #e9d5ff; box-shadow: none; }
    .watch-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .link-button {
      display: inline-flex; align-items: center; padding: 7px 11px; border-radius: 999px;
      background: rgba(236, 72, 153, 0.18); border: 1px solid rgba(244, 114, 182, 0.28);
      color: #fce7f3; font-size: 12px; text-decoration: none;
    }
    .link-button.secondary {
      background: rgba(255,255,255,0.08); border-color: rgba(216, 180, 254, 0.18); color: #e9d5ff;
    }
    .footer-note { margin-top: 28px; color: #a78bfa; font-size: 14px; line-height: 1.7; }
    .footer-note a { color: #e9d5ff; text-decoration: none; border-bottom: 1px solid rgba(233, 213, 255, 0.35); }
    .footer-note a:hover { color: #fff; }
    @media (max-width: 640px) {
      .page-shell { width: min(100% - 20px, 1200px); padding-top: 20px; }
      .anime-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="jjk-background" id="jjk-background" aria-hidden="true">
    <img
      class="jjk-background-image"
      id="jjk-background-image"
      src="assets/jjk-bg-2k.png"
      alt=""
      decoding="async"
      fetchpriority="high"
    />
    <div class="jjk-background-overlay"></div>
  </div>
  <main class="page-shell">
    <section class="hero">
      <h1 id="season-title">追番日历 / Anime Calendar</h1>
    </section>

    <div class="toolbar">
      <button id="reload-btn" type="button">刷新数据 / Refresh</button>
      <button id="filter-btn" class="secondary" type="button">只看我的追番 / My List</button>
    </div>

    <div class="status-tabs" role="tablist" aria-label="番剧状态分页">
      <button id="tab-airing" class="status-tab active" type="button" role="tab" aria-selected="true">连载中 / Airing</button>
      <button id="tab-finished" class="status-tab" type="button" role="tab" aria-selected="false">已完结 / Completed</button>
    </div>

    <div id="status-box" class="status-box">正在加载番剧数据，请稍等...</div>

    <div class="stats-row">
      <div class="stat-card"><strong id="airing-count">0</strong><span>连载中 / Airing</span></div>
      <div class="stat-card"><strong id="finished-count">0</strong><span>已完结 / Completed</span></div>
      <div class="stat-card"><strong id="tracked-count">0</strong><span>我的追番 / My List</span></div>
    </div>

    <div id="calendar" class="calendar-grid"></div>

    <p class="footer-note" id="footer-note">
      数据来源：MyAnimeList 热门 TV 番剧 + Bangumi 评分。
      本地使用请运行 <strong>启动网站.bat</strong>。
      <br /><a href="author.html">作者入口 / Author</a>
    </p>
  </main>

  <script src="zh-convert.js"></script>
  <script>
    const STORAGE_KEY = "tracked-anime-ids";
    const IS_LOCAL_DEV =
      location.hostname === "localhost" || location.hostname === "127.0.0.1";
    const USE_API_PROXY = location.protocol.startsWith("http");
    const USE_INTERNATIONAL_LINKS = !IS_LOCAL_DEV;
    const JIKAN_API_BASE = USE_API_PROXY ? "/api/jikan" : "https://api.jikan.moe/v4";
    const FALLBACK_CATALOG_URL = "data/fallback-catalog.json";
    function bangumiPath(path) {
      const suffix = path.startsWith("/") ? path : "/" + path;
      return USE_API_PROXY ? "/api/bgm" + suffix : "https://api.bgm.tv" + suffix;
    }
    const SEASON_ORDER = ["WINTER", "SPRING", "SUMMER", "FALL"];
    const JIKAN_SEASON_SLUG = {
      WINTER: "winter",
      SPRING: "spring",
      SUMMER: "summer",
      FALL: "fall",
    };
    const BROADCAST_DAY_TO_WEEKDAY = {
      Sundays: "星期日",
      Mondays: "星期一",
      Tuesdays: "星期二",
      Wednesdays: "星期三",
      Thursdays: "星期四",
      Fridays: "星期五",
      Saturdays: "星期六",
    };

    function getSeasonMonthLabel(season, year) {
      const month = season === "WINTER" ? 1 : season === "SPRING" ? 4 : season === "SUMMER" ? 7 : 10;
      return `${year}年${month}月`;
    }

    function seasonSortIndex(season, year) {
      return year * 4 + SEASON_ORDER.indexOf(season);
    }

    function getAllSeasonsSince(startYear = 2020) {
      const current = getCurrentSeason();
      const endIndex = seasonSortIndex(current.season, current.year);
      const seasons = [];

      for (let year = startYear; year <= current.year + 1; year += 1) {
        for (const season of SEASON_ORDER) {
          if (seasonSortIndex(season, year) > endIndex) continue;
          seasons.push({
            season,
            year,
            label: getSeasonMonthLabel(season, year),
          });
        }
      }

      return seasons.sort((a, b) => seasonSortIndex(b.season, b.year) - seasonSortIndex(a.season, a.year));
    }

    function groupAnimeByYearMonth(items) {
      const monthMap = new Map();

      for (const item of items) {
        const key = `${item.seasonYear}-${item.season}`;
        if (!monthMap.has(key)) monthMap.set(key, []);
        monthMap.get(key).push(item);
      }

      const months = Array.from(monthMap.entries()).map(([key, bucket]) => {
        const sample = bucket[0];
        const allItems = sortAnimeByScore(bucket);
        return {
          key,
          label: getSeasonMonthLabel(sample.season, sample.seasonYear),
          year: sample.seasonYear,
          season: sample.season,
          seasonYear: sample.seasonYear,
          itemCount: bucket.length,
          allItems,
        };
      }).sort((a, b) => seasonSortIndex(b.season, b.seasonYear) - seasonSortIndex(a.season, a.seasonYear));

      const yearBlocks = [];
      for (const month of months) {
        const last = yearBlocks[yearBlocks.length - 1];
        if (!last || last.year !== month.year) {
          yearBlocks.push({ year: month.year, months: [month] });
        } else {
          last.months.push(month);
        }
      }

      return yearBlocks;
    }

    const WEEKDAY_ORDER = ["星期一","星期二","星期三","星期四","星期五","星期六","星期日"];

    let allAnime = [];
    let showTrackedOnly = false;
    let activeStatusTab = "airing";
    const CATALOG_CACHE_KEY = "anilist-catalog-v5";
    const MIN_TV_MEMBERS = 5000;
    const MAX_SEASON_PAGES = 1;
    const CATALOG_CACHE_MAX_AGE_MS = 24 * 60 * 60 * 1000;
    const FETCH_TIMEOUT_MS = 20000;

    function getCurrentSeason(date = new Date()) {
      const month = date.getMonth() + 1;
      const year = date.getFullYear();
      if (month === 12) return { season: "WINTER", year: year + 1, label: `${year + 1} 冬季` };
      if (month <= 2) return { season: "WINTER", year, label: `${year} 冬季` };
      if (month <= 5) return { season: "SPRING", year, label: `${year} 春季` };
      if (month <= 8) return { season: "SUMMER", year, label: `${year} 夏季` };
      return { season: "FALL", year, label: `${year} 秋季` };
    }

    function isAiringStatus(status) {
      return status === "RELEASING" || status === "HIATUS";
    }

    function isFinishedStatus(status) {
      return status === "FINISHED";
    }

    function isPublishedAnime(item) {
      return isAiringStatus(item.status) || isFinishedStatus(item.status);
    }

    function filterAnimeForView(items) {
      const published = items.filter(isPublishedAnime);
      if (activeStatusTab === "finished") {
        return published.filter(function (item) {
          return isFinishedStatus(item.status);
        });
      }
      return published.filter(function (item) {
        return isAiringStatus(item.status);
      });
    }

    function countPublishedAnime(items) {
      let airing = 0;
      let finished = 0;
      for (const item of items) {
        if (isAiringStatus(item.status)) airing += 1;
        else if (isFinishedStatus(item.status)) finished += 1;
      }
      return { airing, finished };
    }

    function updateStatusTabs() {
      document.getElementById("tab-airing").classList.toggle("active", activeStatusTab === "airing");
      document.getElementById("tab-finished").classList.toggle("active", activeStatusTab === "finished");
      document.getElementById("tab-airing").setAttribute("aria-selected", activeStatusTab === "airing" ? "true" : "false");
      document.getElementById("tab-finished").setAttribute("aria-selected", activeStatusTab === "finished" ? "true" : "false");
    }

    function getTrackedIds() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function setTrackedIds(ids) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
    }

    function formatBeijingTime(unixSeconds) {
      return new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        weekday: "short",
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
      }).format(new Date(unixSeconds * 1000));
    }

    function formatPremiereDate(isoString) {
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return isoString;
      return new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long",
      }).format(date);
    }

    function getWeekdayLabel(unixSeconds) {
      return new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        weekday: "long",
      }).format(new Date(unixSeconds * 1000));
    }

    function getStatusLabel(status) {
      return ({
        RELEASING: "连载中 / Airing",
        NOT_YET_RELEASED: "未开播 / Upcoming",
        FINISHED: "已完结 / Completed",
        CANCELLED: "已取消 / Cancelled",
        HIATUS: "暂停 / Hiatus",
        "Currently Airing": "连载中 / Airing",
        "Not yet aired": "未开播 / Upcoming",
        "Finished Airing": "已完结 / Completed",
      })[status] || status;
    }

    function getFormatLabel(format) {
      return ({
        TV: "TV",
        TV_SHORT: "短篇 TV",
        MOVIE: "剧场版",
        SPECIAL: "特别篇",
        OVA: "OVA",
        ONA: "ONA",
        MUSIC: "音乐",
        Movie: "剧场版",
        Special: "特别篇",
      })[format] || format || "动画";
    }

    function sleep(ms) {
      return new Promise(function (resolve) {
        window.setTimeout(resolve, ms);
      });
    }

    function mapJikanStatus(status) {
      return ({
        "Currently Airing": "RELEASING",
        "Not yet aired": "NOT_YET_RELEASED",
        "Finished Airing": "FINISHED",
      })[status] || status;
    }

    function mapJikanType(type) {
      return ({
        TV: "TV",
        Movie: "MOVIE",
        OVA: "OVA",
        ONA: "ONA",
        Special: "SPECIAL",
      })[type] || type;
    }

    function inferWeekdayLabel(entry) {
      const broadcast = entry.broadcast || {};
      if (broadcast.day && BROADCAST_DAY_TO_WEEKDAY[broadcast.day]) {
        return BROADCAST_DAY_TO_WEEKDAY[broadcast.day];
      }
      return null;
    }

    function isAdultEntry(entry) {
      const ratingText = String(entry.rating || "").toLowerCase();
      if (ratingText.includes("rx") || ratingText.includes("hentai")) return true;
      if ((entry.type === "OVA" || entry.type === "ONA") && ratingText.includes("r+")) return true;

      const genreNames = []
        .concat(entry.genres || [], entry.explicit_genres || [], entry.themes || [])
        .map(function (genre) {
          return String(genre.name || genre).toLowerCase();
        });

      if (genreNames.some(function (name) {
        return name === "hentai" || name === "erotica";
      })) return true;

      if ((entry.type === "OVA" || entry.type === "ONA") && (entry.members || 0) < MIN_TV_MEMBERS) {
        return true;
      }

      return false;
    }

    function isPopularEntry(entry) {
      if (isAdultEntry(entry)) return false;
      if (entry.type !== "TV") return false;
      return (entry.members || 0) >= MIN_TV_MEMBERS;
    }

    function isAdultItem(item) {
      if (item.isAdult) return true;
      const ratingText = String(item.malRating || "").toLowerCase();
      if (ratingText.includes("rx") || ratingText.includes("hentai")) return true;
      if (item.format !== "TV" && ratingText.includes("r+")) return true;
      return false;
    }

    function isPopularItem(item) {
      if (isAdultItem(item)) return false;
      if (item.format !== "TV") return false;
      if ((item.members || 0) >= MIN_TV_MEMBERS) return true;
      if (typeof item.score === "number" && item.score > 0) return true;
      if (typeof item.rank === "number" && item.rank > 0 && item.rank <= 5000) return true;
      return false;
    }

    function sortAnimeByScore(items) {
      return items.slice().sort(function (a, b) {
        const scoreA = getDisplayScore(a) ?? -1;
        const scoreB = getDisplayScore(b) ?? -1;
        if (scoreB !== scoreA) return scoreB - scoreA;
        const popA = a.popularity || 999999;
        const popB = b.popularity || 999999;
        if (popA !== popB) return popA - popB;
        return getPrimaryTitle(a).localeCompare(getPrimaryTitle(b), "zh-CN");
      });
    }

    function pickFeaturedAnime(items) {
      const scored = items.filter(function (item) {
        const score = getDisplayScore(item);
        return typeof score === "number" && score >= 8;
      });
      if (scored.length) return scored.slice(0, 6);
      return items.filter(function (item) {
        return typeof getDisplayScore(item) === "number";
      }).slice(0, 6);
    }

    function getDisplayScore(item) {
      if (typeof item.bangumiScore === "number" && item.bangumiScore > 0) return item.bangumiScore;
      if (typeof item.score === "number" && item.score > 0) return item.score;
      return null;
    }

    function getScoreSource(item) {
      if (typeof item.bangumiScore === "number" && item.bangumiScore > 0) return "bangumi";
      if (typeof item.score === "number" && item.score > 0) return "mal";
      return null;
    }

    function getScoreVoters(item) {
      if (typeof item.bangumiScoreCount === "number" && item.bangumiScoreCount > 0) {
        return item.bangumiScoreCount;
      }
      if (typeof item.scoredBy === "number" && item.scoredBy > 0) return item.scoredBy;
      return null;
    }

    function getScoreTier(score) {
      if (typeof score !== "number") return "none";
      if (score >= 8) return "high";
      if (score >= 7) return "mid";
      return "low";
    }

    function formatScoreValue(score) {
      if (typeof score !== "number") return null;
      return score.toFixed(1);
    }

    function extractBangumiRating(subject) {
      const rating = subject && subject.rating;
      if (!rating || typeof rating.score !== "number" || rating.score <= 0) return null;
      return {
        bangumiScore: rating.score,
        bangumiScoreCount: typeof rating.total === "number" ? rating.total : null,
      };
    }

    function mapJikanAnime(entry, seasonInfo) {
      const broadcast = entry.broadcast || {};
      const titleJapanese = entry.title_japanese || entry.title || null;
      const titleEnglish = entry.title_english || null;
      const weekdayLabel = inferWeekdayLabel(entry);
      const airedFrom = entry.aired && entry.aired.from ? entry.aired.from : null;
      const score = typeof entry.score === "number" ? entry.score : null;

      return {
        id: entry.mal_id,
        title: titleEnglish || titleJapanese || "未知番剧",
        titleChinese: null,
        titleNative: titleJapanese,
        titleRomaji: null,
        titleEnglish,
        bangumiId: null,
        coverImage:
          entry.images?.jpg?.large_image_url ||
          entry.images?.jpg?.image_url ||
          null,
        format: mapJikanType(entry.type),
        status: mapJikanStatus(entry.status),
        nextEpisode: entry.episodes || null,
        nextAiringAt: null,
        score,
        scoredBy: entry.scored_by || null,
        rank: entry.rank || null,
        members: entry.members || 0,
        popularity: entry.popularity || null,
        malRating: entry.rating || null,
        isAdult: isAdultEntry(entry),
        weekdayLabel,
        weekdaySource: broadcast.day ? "broadcast" : null,
        airedFrom,
        broadcastLabel: broadcast.string || entry.aired?.string || null,
        season: seasonInfo.season,
        seasonYear: seasonInfo.year,
      };
    }

    function normalizeTitle(value) {
      if (!value) return "";
      return value
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[·・:：!！?？\-—_]/g, "")
        .replace(/season\d+/gi, "")
        .replace(/第[一二三四五六七八九十\d]+期/g, "");
    }

    function getPrimaryTitle(item) {
      return item.titleChinese || item.titleEnglish || item.titleNative || item.title || "未知番剧";
    }

    function getJapaneseTitle(item) {
      if (!item.titleNative || !item.titleNative.trim()) return null;
      const primary = getPrimaryTitle(item);
      if (item.titleNative.trim() === primary.trim()) return null;
      return item.titleNative.trim();
    }

    function getDisplayTitle(item) {
      const primary = getPrimaryTitle(item);
      const japanese = getJapaneseTitle(item);
      return japanese ? primary + " / " + japanese : primary;
    }

    function pickChineseName(subject) {
      return pickSimplifiedChineseName(subject);
    }

    const BANGUMI_CACHE_KEY = "bangumi-meta-cache-v3";

    function loadBangumiCache() {
      try {
        return JSON.parse(localStorage.getItem(BANGUMI_CACHE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveBangumiCache(cache) {
      localStorage.setItem(BANGUMI_CACHE_KEY, JSON.stringify(cache));
    }

    function getSearchKeyword(item) {
      return (
        item.titleChinese ||
        (item.titleEnglish ? item.titleEnglish.split(":")[0].trim() : "") ||
        item.titleEnglish ||
        item.titleNative ||
        item.title ||
        "anime"
      );
    }

    function getBilibiliSearchUrl(item) {
      return "https://search.bilibili.com/all?keyword=" + encodeURIComponent(getSearchKeyword(item));
    }

    function getInternationalWatchLinkEntries(keyword, malId) {
      return [
        { label: "免费 · Crunchyroll", url: "https://www.crunchyroll.com/search?q=" + encodeURIComponent(keyword) },
        { label: "免费 · Tubi", url: "https://tubitv.com/search/" + encodeURIComponent(keyword) },
        {
          label: "免费 · YouTube",
          url: "https://www.youtube.com/results?search_query=" + encodeURIComponent(keyword + " anime"),
        },
        { label: "免费 · Pluto TV", url: "https://pluto.tv/en/search?query=" + encodeURIComponent(keyword) },
        { label: "Netflix", url: "https://www.netflix.com/search?q=" + encodeURIComponent(keyword) },
        { label: "Hulu", url: "https://www.hulu.com/search?q=" + encodeURIComponent(keyword) },
        { label: "Prime Video", url: "https://www.primevideo.com/search?phrase=" + encodeURIComponent(keyword) },
        { label: "Disney+", url: "https://www.disneyplus.com/search?q=" + encodeURIComponent(keyword) },
        { label: "HiDIVE", url: "https://www.hidive.com/search?q=" + encodeURIComponent(keyword) },
        { label: "详情 · MAL", url: "https://myanimelist.net/anime/" + malId },
      ];
    }

    function getWatchLinksHtml(item) {
      const keyword = getSearchKeyword(item);
      if (USE_INTERNATIONAL_LINKS) {
        return getInternationalWatchLinkEntries(keyword, item.id)
          .map(function (entry, index) {
            const cls = index === 0 ? "link-button" : "link-button secondary";
            return (
              '<a class="' + cls + '" href="' + entry.url + '" target="_blank" rel="noopener noreferrer">' +
              entry.label +
              "</a>"
            );
          })
          .join("");
      }

      const bilibiliUrl = getBilibiliSearchUrl(item);
      const bangumiUrl = getBangumiSubjectUrl(item.bangumiId);
      return `
        <a class="link-button" href="${bilibiliUrl}" target="_blank" rel="noopener noreferrer">B站看番</a>
        ${bangumiUrl
          ? `<a class="link-button secondary" href="${bangumiUrl}" target="_blank" rel="noopener noreferrer">番组详情</a>`
          : ""}
      `;
    }

    function getBangumiSubjectUrl(bangumiId) {
      return bangumiId ? "https://bgm.tv/subject/" + bangumiId : null;
    }

    function addTitleMapping(map, chineseTitle, bangumiId, aliases, ratingMeta) {
      const info = {
        titleChinese: chineseTitle,
        bangumiId: bangumiId,
        bangumiScore: ratingMeta && ratingMeta.bangumiScore ? ratingMeta.bangumiScore : null,
        bangumiScoreCount: ratingMeta && ratingMeta.bangumiScoreCount ? ratingMeta.bangumiScoreCount : null,
      };
      map.set(normalizeTitle(chineseTitle), info);
      for (const alias of aliases) {
        if (!alias) continue;
        map.set(normalizeTitle(alias), info);
      }
    }

    function lookupBangumiInfo(item, titleMap) {
      const candidates = [item.titleNative, item.titleRomaji, item.titleEnglish].filter(Boolean);
      for (const candidate of candidates) {
        const direct = titleMap.get(normalizeTitle(candidate));
        if (direct) return direct;
      }
      for (const candidate of candidates) {
        const normalized = normalizeTitle(candidate);
        if (normalized.length < 4) continue;
        for (const [key, value] of titleMap.entries()) {
          if (key.length < 4) continue;
          if (normalized.includes(key) || key.includes(normalized)) return value;
        }
      }
      return null;
    }

    function buildBangumiKeywords(item) {
      const keywords = new Set();
      if (item.titleNative) keywords.add(item.titleNative.trim());
      if (item.titleRomaji) keywords.add(item.titleRomaji.trim());
      if (item.titleEnglish) {
        const english = item.titleEnglish.trim();
        keywords.add(english);
        keywords.add((english.split(":")[0] || "").trim());
        keywords.add((english.split(" - ")[0] || "").trim());
      }
      return Array.from(keywords).filter(Boolean);
    }

    function scoreSubjectMatch(query, subject) {
      const normalizedQuery = normalizeTitle(query);
      if (!normalizedQuery) return 0;
      const candidates = [subject.name_cn, subject.name].filter(Boolean);
      let best = 0;
      for (const candidate of candidates) {
        const normalizedCandidate = normalizeTitle(candidate);
        if (!normalizedCandidate) continue;
        if (normalizedQuery === normalizedCandidate) return 100;
        if (normalizedCandidate.includes(normalizedQuery) || normalizedQuery.includes(normalizedCandidate)) {
          best = Math.max(best, 80);
        }
      }
      return best;
    }

    function pickBestBangumiSubject(keyword, subjects) {
      if (!subjects.length) return null;
      const ranked = subjects
        .map((subject) => ({ subject, score: scoreSubjectMatch(keyword, subject) }))
        .sort((a, b) => b.score - a.score);
      if (ranked[0].score >= 60) return ranked[0].subject;
      if (subjects.length === 1) return subjects[0];
      return ranked[0].score >= 40 ? ranked[0].subject : null;
    }

    async function searchBangumiSubjects(keyword) {
      const result = await bangumiRequest(bangumiPath("/v0/search/subjects?limit=50"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          keyword,
          filter: { type: ["2"] },
          limit: 8,
          offset: 0,
        }),
      });
      return result.data || [];
    }

    async function fetchBangumiSubjectMeta(subjectId) {
      const subject = await bangumiRequest(bangumiPath("/v0/subjects/" + subjectId));
      const ratingMeta = extractBangumiRating(subject);
      return {
        titleChinese: pickChineseName(subject),
        bangumiId: subject.id,
        bangumiScore: ratingMeta ? ratingMeta.bangumiScore : null,
        bangumiScoreCount: ratingMeta ? ratingMeta.bangumiScoreCount : null,
      };
    }

    async function resolveBangumiForItem(item) {
      const cache = loadBangumiCache();
      if (cache[item.id] && (cache[item.id].bangumiScore || cache[item.id].bangumiId)) {
        return cache[item.id];
      }

      if (item.bangumiId && !item.bangumiScore) {
        try {
          const resolved = await fetchBangumiSubjectMeta(item.bangumiId);
          cache[item.id] = Object.assign({}, cache[item.id] || {}, resolved);
          saveBangumiCache(cache);
          return cache[item.id];
        } catch {}
      }

      const keywords = buildBangumiKeywords(item);
      for (const keyword of keywords) {
        try {
          const subjects = await searchBangumiSubjects(keyword);
          const best = pickBestBangumiSubject(keyword, subjects);
          if (!best) continue;

          const ratingMeta = extractBangumiRating(best);
          const resolved = {
            titleChinese: pickChineseName(best),
            bangumiId: best.id,
            bangumiScore: ratingMeta ? ratingMeta.bangumiScore : null,
            bangumiScoreCount: ratingMeta ? ratingMeta.bangumiScoreCount : null,
          };
          cache[item.id] = resolved;
          saveBangumiCache(cache);
          return resolved;
        } catch {
          continue;
        }
      }
      return null;
    }

    async function fetchBangumiTitleMap(seasonInfo) {
      const map = new Map();

      try {
        const calendar = await bangumiRequest(bangumiPath("/calendar"));
        for (const day of calendar) {
          for (const item of day.items || []) {
            const chineseTitle = pickChineseName(item);
            if (!chineseTitle) continue;
            addTitleMapping(
              map,
              chineseTitle,
              item.id,
              [item.name, item.name_cn],
              extractBangumiRating(item)
            );
          }
        }
      } catch {}

      const keywords = [
        getBangumiSeasonKeyword(seasonInfo.season, seasonInfo.year),
        getBangumiSeasonKeyword(seasonInfo.season, seasonInfo.year) + "新番",
      ];

      for (const keyword of keywords) {
        try {
          const result = await bangumiRequest(bangumiPath("/v0/search/subjects?limit=50"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              keyword,
              filter: { type: ["2"] },
              limit: 50,
              offset: 0,
            }),
          });

          for (const subject of result.data || []) {
            const chineseTitle = pickChineseName(subject);
            if (!chineseTitle) continue;
            addTitleMapping(
              map,
              chineseTitle,
              subject.id,
              [subject.name, subject.name_cn],
              extractBangumiRating(subject)
            );
          }
        } catch {}
      }

      return map;
    }

    function applyResolvedInfo(item, resolved) {
      if (!resolved) return item;
      const next = {
        ...item,
        titleChinese: resolved.titleChinese || item.titleChinese,
        bangumiId: resolved.bangumiId || item.bangumiId || null,
        bangumiScore: resolved.bangumiScore ?? item.bangumiScore ?? null,
        bangumiScoreCount: resolved.bangumiScoreCount ?? item.bangumiScoreCount ?? null,
      };
      next.title = getDisplayTitle(next);
      return next;
    }

    function enrichAnimeTitles(items, titleMap) {
      return items.map((item) => {
        const matched = lookupBangumiInfo(item, titleMap);
        return applyResolvedInfo(item, matched);
      });
    }

    async function enrichAllAnimeMetadata(items, onProgress) {
      const cache = loadBangumiCache();
      let working = items.map(function (item) {
        return applyResolvedInfo(item, cache[item.id] || null);
      });

      const recentSeasons = getAllSeasonsSince(2020).slice(0, 6);
      const titleMap = new Map();

      for (const seasonInfo of recentSeasons) {
        try {
          const seasonMap = await fetchBangumiTitleMap(seasonInfo);
          for (const [key, value] of seasonMap.entries()) {
            if (!titleMap.has(key)) titleMap.set(key, value);
          }
        } catch {}
      }

      working = enrichAnimeTitles(working, titleMap);
      if (onProgress) onProgress(working.slice());

      const needRating = working.filter(function (item) {
        return isPublishedAnime(item) && isPopularItem(item) && !getDisplayScore(item);
      });
      const limit = Math.min(needRating.length, 80);

      for (let index = 0; index < limit; index += 1) {
        const item = needRating[index];
        const resolved = await resolveBangumiForItem(item);
        if (resolved) {
          Object.assign(item, applyResolvedInfo(item, resolved));
        }
        if (onProgress && (index + 1) % 4 === 0) onProgress(working.slice());
        await sleep(260);
      }

      return working.map(function (item) {
        return {
          ...item,
          title: getDisplayTitle(item),
        };
      });
    }

    function getBangumiSeasonKeyword(season, year) {
      if (season === "WINTER") return `${year}年1月`;
      if (season === "SPRING") return `${year}年4月`;
      if (season === "SUMMER") return `${year}年7月`;
      return `${year}年10月`;
    }

    async function bangumiRequest(url, init) {
      const controller = new AbortController();
      const timer = window.setTimeout(function () {
        controller.abort();
      }, 12000);
      try {
        const response = await fetch(url, {
          ...init,
          signal: controller.signal,
          headers: {
            "User-Agent": "anime-season-calendar/0.1 (personal project)",
            Accept: "application/json",
            ...(init && init.headers ? init.headers : {}),
          },
        });
        if (!response.ok) throw new Error("Bangumi 请求失败: " + response.status);
        return response.json();
      } finally {
        window.clearTimeout(timer);
      }
    }

    function groupAnimeByBroadcastDay(items) {
      const broadcastItems = items.filter(function (item) {
        return item.weekdayLabel && item.weekdaySource === "broadcast";
      });
      if (!broadcastItems.length) return [];

      const groups = new Map();
      for (const item of broadcastItems) {
        if (!groups.has(item.weekdayLabel)) groups.set(item.weekdayLabel, []);
        groups.get(item.weekdayLabel).push(item);
      }

      return WEEKDAY_ORDER.map(function (label) {
        return {
          label,
          items: sortAnimeByScore(groups.get(label) || []),
        };
      }).filter(function (dayGroup) {
        return dayGroup.items.length > 0;
      });
    }

    async function fetchWithTimeout(url, options, timeoutMs = FETCH_TIMEOUT_MS) {
      const controller = new AbortController();
      const timer = setTimeout(function () {
        controller.abort();
      }, timeoutMs);

      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
    }

    function readCatalogCache() {
      try {
        const raw = localStorage.getItem(CATALOG_CACHE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.items) || !parsed.savedAt) return null;
        if (Date.now() - parsed.savedAt > CATALOG_CACHE_MAX_AGE_MS) return null;
        return parsed.items;
      } catch {
        return null;
      }
    }

    function writeCatalogCache(items) {
      try {
        localStorage.setItem(
          CATALOG_CACHE_KEY,
          JSON.stringify({ savedAt: Date.now(), items })
        );
      } catch {
        // 缓存失败不影响正常使用
      }
    }

    function applyAnimeList(items) {
      const unique = new Map();
      for (const item of items) {
        if (!isPopularItem(item)) continue;
        unique.set(item.id, item);
      }
      allAnime = Array.from(unique.values()).map(function (item) {
        return {
          ...item,
          title: getDisplayTitle(item),
        };
      });
      render();
    }

    async function fetchSeasonAnime(seasonInfo) {
      const seasonSlug = JIKAN_SEASON_SLUG[seasonInfo.season];
      const allItems = [];
      let page = 1;
      let hasNextPage = true;

      while (hasNextPage && page <= MAX_SEASON_PAGES) {
        const url = `${JIKAN_API_BASE}/seasons/${seasonInfo.year}/${seasonSlug}?page=${page}`;
        const response = await fetchWithTimeout(url, {
          headers: { Accept: "application/json" },
        });

        if (!response.ok) throw new Error("番剧数据请求失败: " + response.status);

        const json = await response.json();
        const mapped = (json.data || [])
          .filter(function (entry) {
            return isPopularEntry(entry);
          })
          .map(function (entry) {
            return mapJikanAnime(entry, seasonInfo);
          });

        allItems.push(...mapped);
        hasNextPage = Boolean(json.pagination && json.pagination.has_next_page);
        page += 1;
        if (hasNextPage) await sleep(420);
      }

      const unique = new Map();
      for (const item of allItems) unique.set(item.id, item);
      return Array.from(unique.values());
    }

    async function fetchAllAnimeSince2020(onProgress, options = {}) {
      const seasons = getAllSeasonsSince(2020);
      const allItems = [];
      const skipKeys = new Set(options.skipSeasonKeys || []);
      let loadedCount = 0;

      for (let index = 0; index < seasons.length; index += 1) {
        const seasonInfo = seasons[index];
        const seasonKey = `${seasonInfo.year}-${seasonInfo.season}`;
        if (skipKeys.has(seasonKey)) continue;

        loadedCount += 1;
        if (onProgress) {
          onProgress(`正在加载 ${seasonInfo.label}（${loadedCount}/${seasons.length - skipKeys.size}）`);
        }

        try {
          const items = await fetchSeasonAnime(seasonInfo);
          allItems.push(...items);
          if (options.onSeasonLoaded) {
            options.onSeasonLoaded(items);
          }
        } catch (error) {
          if (onProgress) {
            onProgress(`加载 ${seasonInfo.label} 失败，继续下一季...`);
          }
        }

        await sleep(850);
      }

      const unique = new Map();
      for (const item of allItems) unique.set(item.id, item);
      return Array.from(unique.values());
    }

    function createScoreHtml(item) {
      const displayScore = getDisplayScore(item);
      const tier = getScoreTier(displayScore);
      const voters = getScoreVoters(item);
      const source = getScoreSource(item);
      const sourceLabel = source === "bangumi" ? "Bangumi" : source === "mal" ? "MAL" : "";
      const votersText =
        typeof voters === "number" && voters > 0
          ? `<span class="score-voters">${voters.toLocaleString("zh-CN")} 人评分 · ${sourceLabel}</span>`
          : sourceLabel
            ? `<span class="score-voters">来源：${sourceLabel}</span>`
            : typeof item.rank === "number" && item.rank > 0
              ? `<span class="score-voters">MAL 热度排名 #${item.rank}</span>`
              : "";

      return `
        <div class="score-row">
          ${displayScore
            ? `<span class="score-badge score-${tier}">⭐ ${formatScoreValue(displayScore)}</span>`
            : typeof item.rank === "number" && item.rank > 0
              ? `<span class="score-badge score-mid">🔥 热度 #${item.rank}</span>`
              : `<span class="score-badge score-none">暂无评分</span>`}
          ${votersText}
          ${typeof displayScore === "number" && displayScore >= 8
            ? `<span class="tag score-high-tag">高分推荐</span>`
            : ""}
        </div>
      `;
    }

    function createAnimeCardHtml(item, tracked) {
      const displayTitle = getDisplayTitle(item);
      const primaryTitle = getPrimaryTitle(item);
      const japaneseTitle = getJapaneseTitle(item);
      const updateDayTag = item.weekdayLabel
        ? `<span class="tag">${item.weekdayLabel}更新</span>`
        : "";

      return `
        ${item.coverImage
          ? `<img class="anime-cover" src="${item.coverImage}" alt="${displayTitle}" />`
          : `<div class="anime-cover placeholder">暂无封面</div>`}
        <div>
          <div class="anime-title-group">
            <h3 class="anime-title">${primaryTitle}</h3>
            ${japaneseTitle ? `<p class="anime-title-jp">${japaneseTitle}</p>` : ""}
          </div>
          ${createScoreHtml(item)}
          <div class="anime-meta">
            <span class="tag accent">${getFormatLabel(item.format)}</span>
            <span class="tag">${getStatusLabel(item.status)}</span>
            ${updateDayTag}
            ${item.nextEpisode ? `<span class="tag">第 ${item.nextEpisode} 集</span>` : ""}
          </div>
          <p class="anime-time">${item.nextAiringAt
            ? `下次更新：${formatBeijingTime(item.nextAiringAt)}（北京时间）`
            : item.broadcastLabel || (item.airedFrom ? `预计开播：${formatPremiereDate(item.airedFrom)}` : "更新时间待定")}</p>
          <button type="button" class="track-button ${tracked ? "is-tracked" : ""}" data-id="${item.id}">
            ${tracked ? "已加入追番" : "加入追番"}
          </button>
          <div class="watch-links">
            ${getWatchLinksHtml(item)}
          </div>
        </div>
      `;
    }

    function appendAnimeGrid(parent, items, trackedIds, gridClass) {
      const grid = document.createElement("div");
      grid.className = gridClass || "anime-grid";
      for (const item of items) {
        const tracked = trackedIds.includes(item.id);
        const card = document.createElement("article");
        card.className = "anime-card";
        card.innerHTML = createAnimeCardHtml(item, tracked);
        grid.appendChild(card);
      }
      parent.appendChild(grid);
      return grid;
    }

    function bindTrackButtons(root) {
      root.querySelectorAll(".track-button").forEach((button) => {
        button.addEventListener("click", () => {
          const id = Number(button.dataset.id);
          const ids = getTrackedIds();
          const tracked = ids.includes(id);
          const nextIds = tracked ? ids.filter((value) => value !== id) : [...ids, id];
          setTrackedIds(nextIds);
          render();
        });
      });
    }
    function render() {
      const trackedIds = getTrackedIds();
      const sourceAnime = showTrackedOnly
        ? allAnime.filter(function (item) {
            return trackedIds.includes(item.id);
          })
        : allAnime;
      const visibleAnime = filterAnimeForView(sourceAnime);
      const counts = countPublishedAnime(allAnime);

      updateStatusTabs();
      document.getElementById("airing-count").textContent = String(counts.airing);
      document.getElementById("finished-count").textContent = String(counts.finished);
      document.getElementById("tracked-count").textContent = String(trackedIds.length);
      document.getElementById("filter-btn").textContent = showTrackedOnly ? "查看全部 / View All" : "只看我的追番 / My List";

      const yearBlocks = groupAnimeByYearMonth(visibleAnime);
      const calendar = document.getElementById("calendar");
      calendar.innerHTML = "";
      const isFinishedTab = activeStatusTab === "finished";

      if (!yearBlocks.length) {
        calendar.innerHTML = `
          <section class="day-section">
            <div class="day-header">
              <h2>${isFinishedTab ? "暂无已完结番剧 / No Completed Anime" : "暂无连载中番剧 / No Airing Anime"}</h2>
              <span class="day-count">${showTrackedOnly ? "追番清单里还没有这类番剧" : "未开播的番剧不会显示在这里"}</span>
            </div>
          </section>`;
        return;
      }

      for (const yearBlock of yearBlocks) {
        const yearDivider = document.createElement("div");
        yearDivider.className = "year-divider";
        yearDivider.textContent = `${yearBlock.year}年`;
        calendar.appendChild(yearDivider);

        for (const month of yearBlock.months) {
          const monthSection = document.createElement("section");
          monthSection.className = "month-section";
          monthSection.innerHTML = `<div class="month-header">${month.label} · ${month.allItems.length} 部</div>`;

          const listHeader = document.createElement("div");
          listHeader.className = "subsection-header";
          listHeader.textContent = isFinishedTab
            ? "热门已完结 / Popular Completed · 按评分排序 / By Rating"
            : "热门连载中 / Popular Airing · 按评分排序 / By Rating";
          monthSection.appendChild(listHeader);
          appendAnimeGrid(monthSection, month.allItems, trackedIds);

          calendar.appendChild(monthSection);
          bindTrackButtons(monthSection);
        }
      }
    }

    async function loadFallbackCatalog() {
      try {
        const response = await fetchWithTimeout(FALLBACK_CATALOG_URL, {
          headers: { Accept: "application/json" },
        }, 10000);
        if (!response.ok) return null;
        const json = await response.json();
        if (!json || !Array.isArray(json.items) || !json.items.length) return null;
        return json.items;
      } catch {
        return null;
      }
    }

    function showStatusBriefly(message, durationMs) {
      const statusBox = document.getElementById("status-box");
      statusBox.className = "status-box";
      statusBox.style.display = "";
      statusBox.textContent = message;
      window.setTimeout(function () {
        statusBox.className = "status-box is-hidden";
      }, durationMs || 3500);
    }

    function hideStatusBox() {
      const statusBox = document.getElementById("status-box");
      statusBox.className = "status-box is-hidden";
    }

    async function loadData() {
      const statusBox = document.getElementById("status-box");
      const currentSeason = getCurrentSeason();
      const currentSeasonKey = `${currentSeason.year}-${currentSeason.season}`;
      const merged = new Map();

      function mergeAndShow(items) {
        for (const item of items) {
          if (!isPopularItem(item)) continue;
          merged.set(item.id, item);
        }
        applyAnimeList(Array.from(merged.values()));
      }

      statusBox.className = "status-box";
      statusBox.style.display = "";
      statusBox.textContent = "正在加载番剧数据，请稍等...";

      const cachedItems = readCatalogCache();
      if (cachedItems && cachedItems.length) {
        const validCache = cachedItems.filter(function (item) {
          return isPopularItem(item);
        });
        if (validCache.length) {
          mergeAndShow(validCache);
          statusBox.textContent = "已显示缓存数据，正在后台更新...";
        }
      }

      try {
        statusBox.textContent = `正在加载 ${currentSeason.label}...`;
        const currentItems = await fetchSeasonAnime(currentSeason);
        mergeAndShow(currentItems);
        statusBox.textContent = "正在加载 2020 年至今其余番剧...";

        const restItems = await fetchAllAnimeSince2020(function (message) {
          statusBox.textContent = message;
        }, {
          skipSeasonKeys: [currentSeasonKey],
          onSeasonLoaded: function (items) {
            mergeAndShow(items);
          },
        });

        mergeAndShow(restItems);
        const baseItems = Array.from(merged.values());

        applyAnimeList(baseItems);
        writeCatalogCache(baseItems);
        statusBox.textContent = "正在匹配 Bangumi 评分与中文名...";

        enrichAllAnimeMetadata(baseItems, function onProgress(items) {
          applyAnimeList(items);
        })
          .then(function (enriched) {
            applyAnimeList(enriched);
            writeCatalogCache(enriched);
            hideStatusBox();
          })
          .catch(function () {
            hideStatusBox();
          });
      } catch (error) {
        const hadData = allAnime.length > 0;
        const fallbackItems = await loadFallbackCatalog();
        let usedFallback = false;

        if (fallbackItems && fallbackItems.length) {
          const validFallback = fallbackItems.filter(function (item) {
            return isPopularItem(item);
          });
          if (validFallback.length && !hadData) {
            applyAnimeList(validFallback);
            usedFallback = true;
          }
        }

        if (allAnime.length) {
          if (usedFallback) {
            showStatusBriefly("在线更新失败，已加载本地热门番剧。", 3500);
            enrichAllAnimeMetadata(allAnime.slice(), function onProgress(items) {
              applyAnimeList(items);
            }).catch(function () {});
          } else {
            showStatusBriefly("在线更新失败，仍显示当前已加载的番剧。", 3500);
          }
          return;
        }

        statusBox.className = "status-box error";
        statusBox.style.display = "";
        statusBox.textContent =
          "加载失败。请先双击运行「启动网站.bat」，不要直接打开 HTML 文件。" +
          (error && error.message ? " 错误：" + error.message : "");
      }
    }

    document.getElementById("reload-btn").addEventListener("click", loadData);
    document.getElementById("filter-btn").addEventListener("click", function () {
      showTrackedOnly = !showTrackedOnly;
      render();
    });
    document.getElementById("tab-airing").addEventListener("click", function () {
      if (activeStatusTab === "airing") return;
      activeStatusTab = "airing";
      render();
    });
    document.getElementById("tab-finished").addEventListener("click", function () {
      if (activeStatusTab === "finished") return;
      activeStatusTab = "finished";
      render();
    });

    async function loadJujutsuBackground() {
      const image = document.getElementById("jjk-background-image");
      if (!image) return;
      // 背景图使用本地文件；加载失败时保留默认渐变背景。
    }

    loadJujutsuBackground();
    updateFooterNote();
    loadData();
    initSiteAnalytics();

    function updateFooterNote() {
      const footer = document.getElementById("footer-note");
      if (!footer) return;
      const watchNote = USE_INTERNATIONAL_LINKS
        ? "观看链接：Crunchyroll、Tubi、YouTube、Pluto TV（免费），Netflix、Hulu、Prime Video、Disney+、HiDIVE（订阅），MAL 为详情页。"
        : "「B站看番」打开 B 站搜索，「番组详情」跳转 Bangumi。本地请运行 启动网站.bat。";
      footer.innerHTML =
        "数据来源：MyAnimeList 热门 TV 番剧 + Bangumi 评分。 " +
        watchNote +
        ' <br /><a href="author.html">作者入口 / Author</a>';
    }

    function getSiteSessionId() {
      const key = "site-session-id";
      let sessionId = localStorage.getItem(key);
      if (!sessionId) {
        sessionId = "sess-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem(key, sessionId);
      }
      return sessionId;
    }

    function initSiteAnalytics() {
      if (!USE_API_PROXY) return;
      const sessionId = getSiteSessionId();

      function sendStats(path) {
        return fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId: sessionId }),
        }).catch(function () {});
      }

      sendStats("/api/stats/visit");
      window.setInterval(function () {
        sendStats("/api/stats/heartbeat");
      }, 30000);
    }
  </script>
</body>
</html>
